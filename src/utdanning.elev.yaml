# yaml-language-server: $schema=https://w3id.org/linkml/meta.schema.json
id: https://w3id.org/novari/fint/utdanning/elev
name: utdanning.elev
imports:
  - linkml:types
  - felles.basisklasser
  - felles.komplekse-datatyper
  - administrasjon.personal
  - felles
  - utdanning.basisklasser
  - utdanning.kodeverk
  - utdanning.timeplan
  - utdanning.utdanningsprogram
  - utdanning.vurdering

classes:

  Elev:
    description: |
      Informasjon om en person som mottar undervisning.
      
      # Beskrivelse 
      
      Beskriver informasjon relatert til undervisning for en Person.
      
      Tilsvarende finnes for ansatte: __Personalressurs__.
    attributes:
      brukernavn:
        range: Identifikator
        annotations:
          writeable: true
        description: |
          Brukernavn til en elev
          
          # Beskrivelse
          
          Skal inneholde brukernavn for pålogging, som finnes i katalogtjenesten (feks Active Directory). Brukes som en identifikator som består, når fødselsnummer og/eller andre identifikatorer endrer seg.
          
          # Format
          
          Brukernavn i det format en elev trenger for å logge seg på systemer i organisasjonen.
          
          # NB!
          
          Fremtidig funksjon for dette feltet er under revisjon.
      elevnummer:
        range: Identifikator
        description: |
          Et unikt nummer som identifiserer en elev
      feidenavn:
        range: Identifikator
        annotations:
          writeable: true
        description: |
          Fullt Feide-navn
          
          # Beskrivelse
          Dette er det samme som `eduPersonPrincipalName` i Feide skjemaet. Se [eduPersonPrincipalName](https://docs.feide.no/schema/info_go/go_attributter_ch02.html#edupersonprincipalname) for utdypende informasjon.
          
          # Eksempel
          - oleolsen@haugaland.fylkeskommune.no
      systemId:
        range: Identifikator
        description: |
          Systemidentifikator til en elev.
          
          # Beskrivelse 
          
          Dette kan være identifikator som eksisterer i SAS/SIS (IPOS/OID).
        required: true
      gjest:
        range: boolean
        description: |
          Viser om eleven er gjesteelev.
      hybeladresse:
        range: Adresse
        annotations:
          writeable: true
        description: |
          Hybeladresse som ikke er folkeregistrert.
      kontaktinformasjon:
        range: Kontaktinformasjon
        annotations:
          writeable: true
        description: |
          Skolespesifikk kontaktinformasjon til en elev
          
          # Beskrivelse
          
          Den fortrukne måten å komme i kontakt med en elev på skolen.
      elevforhold:
        range: Elevforhold
        inverse: elev
        description: |
          Elevforholdene til en elev
        multivalued: true
      person:
        range: Person
        inverse: elev
        annotations:
          primaryRelation: true
        description: |
          Privatperson som er knyttet til en elev.
          
          Relasjonen skal gå til et personobjekt i utdanningsdomenet.
        required: true

  Elevforhold:
    description: |
      Elevens forskjellige utdanningsforhold
      
      # Beskrivelse
      
      En Elev kan ha flere Elevforhold.
      
      # Eksempel
      
      En elev kan være i elevforhold med status privatist og deltid samtidig. Eller en elev kan ha flere elevforhold på flere forskjellige skoler.
    is_a: Utdanningsforhold
    attributes:
      avbruddsdato:
        range: date
        description: |
          Dato da elevforholdet ble avbrutt
          
          # Format
          
          ISO 8601 format `YYYY-MM-DDThh:mm:ssZ`
          
          Timedelen er egentlig unødvendig der bare dato har verdi. Det anbefales at en da setter den til klokken 12 på dagen (zulu). Derved kan dato leses direkte uten å gjøre om til lokaltid ( i Norge).
          
          ## Referanser
          
          * ISO 8601 : https://en.wikipedia.org/wiki/ISO_8601
          
          ## Eksempler
          
          * `29. mars 1990` -&gt; `1990-03-29T12:00:00Z`
          
          * `29. juni 1990` -&gt; `1990-06-29T12:00:00Z`
      gyldighetsperiode:
        range: Periode
        description: |
          Gyldig periode for et gitt elevforhold.
          
          # Beskrivelse
          
          Periode en elev er (eller har vært) i et elevforhold. Inneholder en startdato. Kan inneholde en sluttdato.
      hovedskole:
        range: boolean
        description: |
          Angir om elevforhold er tilknyttet hovedskole.
          
          # Beskrivelse
          
          En elev kan ha flere elevforhold, men kun ett elevforhold skal være tilknyttet en hovedskole.
      tospråkligFagopplæring:
        range: boolean
        description: |
          Viser om eleven har rett på tospråklig fagopplæring (opplæring i fag på to språk).
          
          # Referanser
          
          * UDir Registreringshåndbok:
          https://regbok.udir.no/felt/?B11_S%C3%A6rskilt%20spr%C3%A5koppl%C3%A6ring%20for%20elever%20fra%20spr%C3%A5klige%20minoriteter.&amp;Id=1014318
          * Lovdata: https://lovdata.no/lov/1998-07-17-61/&#167;3-12
      anmerkninger:
        range: Anmerkninger
        description: |
          Anmerkningene i elevforholdet.
        multivalued: true
      avbruddsårsak:
        range: Avbruddsårsak
        description: |
          Årsak til avbrudd av elevforholdet.
        multivalued: true
      eksamensgruppemedlemskap:
        range: Eksamensgruppemedlemskap
        inverse: elevforhold
        description: |
          Eksamensgruppemedlemskapene til et elevforhold
        multivalued: true
      elev:
        range: Elev
        inverse: elevforhold
        annotations:
          primaryRelation: true
        description: |
          Elev som elevforholdet gjelder for
        required: true
      elevfravær:
        range: Fraværsoversikt
        inverse: elevforhold
        description: |
          Fraværsoversikt for elevforholdet
        multivalued: true
      elevvurdering:
        range: Elevvurdering
        inverse: elevforhold
        description: |
          Vurderingsinformasjon for en elev.
      faggruppemedlemskap:
        range: Faggruppemedlemskap
        inverse: elevforhold
        annotations:
          primaryRelation: true
        description: |
          Faggruppemedlemskapene til et elevforhold.
        multivalued: true
      fraværsregistreringer:
        range: Elevfravær
        inverse: elevforhold
        annotations:
          primaryRelation: true
        description: |
          Liste av fraværsregistreringer.
      kategori:
        range: Elevkategori
        description: |
          Kategori på et elevforhold
      klassemedlemskap:
        range: Klassemedlemskap
        inverse: elevforhold
        description: |
          Klassemedlemskapene til et elevforhold.
        multivalued: true
      kontaktlærergruppemedlemskap:
        range: Kontaktlærergruppemedlemskap
        inverse: elevforhold
        description: |
          Kontaktlærergruppemedlemskapene til et elevforhold.
        multivalued: true
      persongruppemedlemskap:
        range: Persongruppemedlemskap
        inverse: elevforhold
        description: |
          Persongruppemedlemskapene til et elevforhold.
        multivalued: true
      programområdemedlemskap:
        range: Programområdemedlemskap
        inverse: elevforhold
        description: |
          Programområdemedlemskapene til et elevforhold.
        multivalued: true
      skole:
        range: Skole
        inverse: elevforhold
        annotations:
          primaryRelation: true
        description: |
          Skole elevforhold er knyttet til.
        required: true
      skoleår:
        range: Skoleår
        description: |
          Skoleåret elevforholdet gjelder for.
      tilrettelegging:
        range: Elevtilrettelegging
        inverse: elev
        description: |
          Tilrettelegginger for eleven.
        multivalued: true
      undervisningsgruppemedlemskap:
        range: Undervisningsgruppemedlemskap
        inverse: elevforhold
        description: |
          Undervisningsmedlemskapene til et elevforhold.
        multivalued: true

  Elevtilrettelegging:
    description: |
      Tilrettelegging en elev har på eksamen.
      
      Det skal her oppgis enten fag eller eksamensform.
      
      # Referanse
      
      [Registrere tilretteleggingstype for eksamen](https://inschool.zendesk.com/hc/no/articles/360031198011-5a-02-Registrere-tilretteleggingstype-for-eksamen)
    attributes:
      systemId:
        range: Identifikator
        description: |
          Intern identifikator som brukes i kildesystemet
        required: true
      eksamensform:
        range: Eksamensform
        description: |
          Eksamensformen tilretteleggingen gjelder for.
      elev:
        range: Elevforhold
        inverse: tilrettelegging
        annotations:
          primaryRelation: true
        description: |
          Eleven det skal tilrettelegges for.
        required: true
      fag:
        range: Fag
        inverse: tilrettelegging
        annotations:
          primaryRelation: true
        description: |
          Faget tilretteleggingen gjelder for.
      tilrettelegging:
        range: Tilrettelegging
        description: |
          Angir hvilken tilrettelegging som skal gis.
        required: true

  Klasse:
    description: |
      Elevgruppe som definert i Opplæringslova &#167;8-2. 
      
      # Beskrivelse
      
      I opplæringa skal elevane delast i klassar eller basisgrupper som skal vareta deira behov for sosialt tilhør. For delar av opplæringa kan elevane delast i andre grupper etter behov. Til vanleg skal organiseringa ikkje skje etter fagleg nivå, kjønn eller etnisk tilhør. Klassane, basisgruppene og gruppene må ikkje vere større enn det som er pedagogisk og tryggleiksmessig forsvarleg.
      
      Klassen eller basisgruppa skal ha ein eller fleire lærarar (kontaktlærarar) som har særleg ansvar for dei praktiske, administrative og sosialpedagogiske gjeremåla som gjeld klassen eller basisgruppa og dei elevane som er der, mellom anna kontakten med heimen.
      
      Begrepet som har tildligere vært kjent som "klasse".
      
      "Vanlig" gruppe i SATS (klassegruppe)
      
      Viser informasjon om:
      * År på VGS person går i
      * Programområdet
      * A, B eller C klasse
      
      Synonym:
      * Klasse
      
      Øvre grense er beskrevet i Opplæringslova &#167;8-3 eller i forskrift.
    is_a: Gruppe
    attributes:
      klassemedlemskap:
        range: Klassemedlemskap
        inverse: klasse
        description: |
          Klassemedlemskapene til en klasse
        multivalued: true
      kontaktlærergruppe:
        range: Kontaktlærergruppe
        inverse: klasse
        description: |
          Grupper med en kontaktlærer og elever som ligger under en gitt klasse.
        multivalued: true
      skole:
        range: Skole
        inverse: klasse
        annotations:
          primaryRelation: true
        description: |
          Skolen en klasse tilhører.
        required: true
      skoleår:
        range: Skoleår
        description: |
          Skoleår for klasse
      termin:
        range: Termin
        description: |
          Terminer for klasse
        multivalued: true
      trinn:
        range: Årstrinn
        inverse: klasse
        annotations:
          primaryRelation: true
        description: |
          Det overordnet trinnet som gruppen hører inn i
        required: true
      undervisningsforhold:
        range: Undervisningsforhold
        inverse: klasse
        annotations:
          primaryRelation: true
        description: |
          Alle lærere tilknyttet klassen.
        multivalued: true

  Klassemedlemskap:
    description: |
      Medlemskap i klasser.
      
      # Beskrivelse
      
      Gruppemedlemskap som knytter sammen elevforhold og klasser.
    is_a: Gruppemedlemskap
    attributes:
      elevforhold:
        range: Elevforhold
        inverse: klassemedlemskap
        annotations:
          primaryRelation: true
        description: |
          Elevforhold et klassemedlemskap tilhører.
        required: true
      klasse:
        range: Klasse
        inverse: klassemedlemskap
        annotations:
          primaryRelation: true
        description: |
          Klassen et klassemedlemskap tilhører.
        required: true

  Kontaktlærergruppe:
    description: |
      Elevgruppe som ein kontaktlærer har særleg ansvar for.
      
      # Beskrivelse
      
      Kontaktlæreren har i denne gruppa særleg ansvar for dei praktiske, administrative og sosialpedagogiske gjeremåla som gjeld klassen eller basisgruppa og dei elevane som er der, mellom anna kontakten med heimen, jf Opplæringslova §8-2.
    is_a: Gruppe
    attributes:
      gruppemedlemskap:
        range: Kontaktlærergruppemedlemskap
        inverse: kontaktlærergruppe
        description: |
          Gruppemedlemskapene til en kontaktlærergruppe.
        multivalued: true
      klasse:
        range: Klasse
        inverse: kontaktlærergruppe
        annotations:
          primaryRelation: true
        description: |
          De overordnede klassene
        multivalued: true
        required: true
      skole:
        range: Skole
        inverse: kontaktlærergruppe
        annotations:
          primaryRelation: true
        description: |
          Skolen kontaktlærergruppen tilhører.
        required: true
      skoleår:
        range: Skoleår
        description: |
          Skoleår for kontaktlærergruppe
      termin:
        range: Termin
        description: |
          Terminer for kontaktlærergruppe
        multivalued: true
      undervisningsforhold:
        range: Undervisningsforhold
        inverse: kontaktlærergruppe
        annotations:
          primaryRelation: true
        description: |
          Alle kontaktlærere i gruppen.
        multivalued: true

  Kontaktlærergruppemedlemskap:
    description: |
      Medlemskap i kontaktlærergrupper.
      
      # Beskrivelse
      
      Gruppemedlemskap som knytter sammen elevforhold og kontaktlærergrupper.
    is_a: Gruppemedlemskap
    attributes:
      elevforhold:
        range: Elevforhold
        inverse: kontaktlærergruppemedlemskap
        annotations:
          primaryRelation: true
        description: |
          Elevforhold et kontaktlærergruppemedlemskap tilhører.
        required: true
      kontaktlærergruppe:
        range: Kontaktlærergruppe
        inverse: gruppemedlemskap
        annotations:
          primaryRelation: true
        description: |
          Kontaktlærergruppen et gruppemedlemskap tilhører.
        required: true

  Persongruppe:
    description: |
      Gruppe av personer som ikke handler om undervisning. Dette kan f.eks. være grupper av elever som skal faktureres.
    is_a: Gruppe
    attributes:
      elev:
        range: Elev
        description: |
          Hvilke elever som er knyttet til gruppen.
        multivalued: true
      persongruppemedlemskap:
        range: Persongruppemedlemskap
        inverse: persongruppe
        annotations:
          primaryRelation: true
        description: |
          Hvilke persongruppemedlemsskap som er knyttet til gruppen.
        multivalued: true
      skole:
        range: Skole
        description: |
          Hvilke skoler som er knyttet til gruppen.
        multivalued: true
      skoleressurs:
        range: Skoleressurs
        description: |
          Hvilke skoleresurser som er knyttet til gruppen
        multivalued: true
      skoleår:
        range: Skoleår
        description: |
          Hvilke skoleår gruppen gjelder for.
        multivalued: true
      termin:
        range: Termin
        description: |
          Hvilke termineer gruppen gjelder for.
        multivalued: true
      undervisningsforhold:
        range: Undervisningsforhold
        description: |
          Hvilke undervisningsforhold som er knyttet til gruppen
        multivalued: true

  Persongruppemedlemskap:
    description: |
      Medlemskap i persongruppe.
      
      # Beskrivelse
      
      Gruppemedlemskap som knytter sammen personer.
    is_a: Gruppemedlemskap
    attributes:
      elevforhold:
        range: Elevforhold
        inverse: persongruppemedlemskap
        annotations:
          primaryRelation: true
        description: |
          Hvilket elevforhold som er medlem i gruppen.
      persongruppe:
        range: Persongruppe
        inverse: persongruppemedlemskap
        description: |
          Hvilken gruppe det er medlemskap for.
        required: true

  Skoleressurs:
    description: |
      Ansatte på en skole.
      
      # Beskrivelse
      
      Kan være undervisningspersonell eller andre administrativt ansatte.
    attributes:
      feidenavn:
        range: Identifikator
        annotations:
          writeable: true
        description: |
          Fullt Feide-navn
          
          # Beskrivelse
          Dette er det samme som `eduPersonPrincipalName` i Feide skjemaet. Se [eduPersonPrincipalName](https://docs.feide.no/schema/info_go/go_attributter_ch02.html#edupersonprincipalname) for utdypende informasjon.
          
          # Eksempel
          - oleolsen@haugaland.fylkeskommune.no
      systemId:
        range: Identifikator
        description: |
          Kildesystemets interne identifikator for skoleressurs.
        required: true
      person:
        range: Person
        description: |
          Privatperson som er knyttet til en skoleressurs.
          
          Relasjonen skal gå til et personobjekt i administrasjonsdomenet.
      personalressurs:
        range: Personalressurs
        inverse: skoleressurs
        annotations:
          primaryRelation: true
        description: |
          Relasjon til informasjon om ansettelsesforhold.
        required: true
      sensor:
        range: Sensor
        inverse: skoleressurs
        description: |
          Sensoroppdrag.
        multivalued: true
      skole:
        range: Skole
        inverse: skoleressurs
        annotations:
          primaryRelation: true
        description: |
          Tilknyttede skoler.
        multivalued: true
      undervisningsforhold:
        range: Undervisningsforhold
        inverse: skoleressurs
        annotations:
          primaryRelation: true
        description: |
          Undervisningsforhold for skoleressurs.
        multivalued: true

  Undervisningsforhold:
    description: |
      Undervisningsforhold til alle med en pedagogisk funksjon
      
      # Beskrivelse 
      
      Alle med en pedagogisk funksjon på skolen kan ha et undervisningsforhold.
      
      # Eksempel
      
      Dette kan for eksempel være lærerens undervisningsforhold til skolen. Underviser en lærer på to skoler, vil det være naturlig å ha to undervisningsforhold.
    is_a: Utdanningsforhold
    attributes:
      hovedskole:
        range: boolean
        description: |
          Angir om undervisningsforholdforhold er tilknyttet hovedskole.
          
          # Beskrivelse
          
          En skoleresurs kan ha flere undervisningsforhold, men kun ett undervisningsforhold skal være tilknyttet en hovedskole.
      time:
        range: Time
        inverse: undervisningsforhold
        annotations:
          primaryRelation: true
        description: |
          Timer hvor lærer underviser
        multivalued: true
      arbeidsforhold:
        range: Arbeidsforhold
        inverse: undervisningsforhold
        annotations:
          primaryRelation: true
        description: |
          Relasjon til en tilsvarende objekt i Adminstrasjons domenet
        required: true
      eksamensgruppe:
        range: Eksamensgruppe
        inverse: undervisningsforhold
        description: |
          Alle eksamensgruppene tilknyttet læreren.
        multivalued: true
      klasse:
        range: Klasse
        inverse: undervisningsforhold
        description: |
          Alle klasser tilknyttet læreren.
        multivalued: true
      kontaktlærergruppe:
        range: Kontaktlærergruppe
        inverse: undervisningsforhold
        description: |
          Alle grupper læreren er kontaktlærer for.
        multivalued: true
      skole:
        range: Skole
        inverse: undervisningsforhold
        annotations:
          primaryRelation: true
        description: |
          Skole som undervisningsforhold er tilknyttet.
        required: true
      skoleressurs:
        range: Skoleressurs
        inverse: undervisningsforhold
        description: |
          Skoleressurs for undervisningsforhold.
        required: true
      undervisningsgruppe:
        range: Undervisningsgruppe
        inverse: undervisningsforhold
        description: |
          Alle undervisningsgrupper læreren deltar i.
        multivalued: true

  Varsel:
    description: |
      Varsel sendt til en elev.
      
      # Referanse
      
      * [VIS - Opprette og sende varsel ](https://inschool.zendesk.com/hc/no/articles/360030859132-4b-21-Opprette-og-sende-varsel)
      * [Forskrift til opplæringslova - &#167; 3-8. Varsling](https://lovdata.no/dokument/SF/forskrift/2006-06-23-724/KAPITTEL_5-1#%C2%A73-8)
    attributes:
      systemId:
        range: Identifikator
        description: |
          Unik identifikator for varselet.
        required: true
      fraværsprosent:
        range: integer
        description: |
          Fraværsprosenten i varselbrev for fravær.
          
          # Representasjon av prosent
          
          I informasjonsmodellen oppgis en prosentverdi som et heltall. Dette tallet er antall hundredels prosent.
          
          ## Eksempel
          
          * 44 prosent vil ha verdien 4400.
          * 58,73 prosent vil ha verdien 5873
        required: true
      sendt:
        range: date
        description: |
          Dato da varselet ble sendt.
        required: true
      tekst:
        range: string
        description: |
          Varselets tekstinnhold.
        required: true
      faggruppemedlemskap:
        range: Faggruppemedlemskap
        inverse: varsel
        annotations:
          primaryRelation: true
        description: |
          Elevens faggruppe varselet gjelder.
        required: true
      karakteransvarlig:
        range: Undervisningsforhold
        description: |
          Læreren i faggruppen. Hovedfaglærer hvis der er flere.
      type:
        range: Varseltype
        description: |
          Type varsel.
      utsteder:
        range: Skoleressurs
        description: |
          Den som utsteder brevet.
